<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Profesyonel Eğitim Planı</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f4;
    --bg3: #eeece8;
    --text: #1a1a18;
    --text2: #6b6b66;
    --text3: #9b9b96;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --info-bg: #E6F1FB;
    --info-text: #185FA5;
    --radius: 8px;
    --radius-lg: 12px;
    --green: #1D9E75;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #2a2a27;
      --bg3: #323230;
      --text: #f0ede8;
      --text2: #a0a09a;
      --text3: #6b6b66;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --info-bg: #0c2d4a;
      --info-text: #85B7EB;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  .page {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  .header {
    margin-bottom: 1.5rem;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .header p {
    font-size: 13px;
    color: var(--text2);
  }

  .progress-wrap {
    background: var(--bg2);
    border-radius: 6px;
    height: 8px;
    margin-top: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 8px;
    border-radius: 6px;
    background: var(--green);
    transition: width 0.4s ease;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 12px 14px;
  }

  .stat-card .lbl {
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 4px;
  }

  .stat-card .val {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
  }

  .tab-bar {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.2rem;
  }

  .tab {
    font-size: 13px;
    padding: 8px 16px;
    cursor: pointer;
    color: var(--text2);
    border: none;
    background: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    font-family: inherit;
    transition: color 0.15s;
  }

  .tab.active {
    color: var(--text);
    border-bottom-color: var(--green);
    font-weight: 500;
  }

  .tab:hover { color: var(--text); }

  .cats {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 1rem;
  }

  .cat-btn {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--bg);
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .cat-btn:hover { color: var(--text); }

  .cat-btn.active {
    background: var(--info-bg);
    color: var(--info-text);
    border-color: transparent;
    font-weight: 500;
  }

  .modules { display: flex; flex-direction: column; gap: 10px; }

  .module-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .module-card:hover { border-color: var(--border2); }

  .module-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
  }

  .mod-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .mod-title { flex: 1; min-width: 0; }
  .mod-title h3 { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .mod-title span { font-size: 11px; color: var(--text2); }

  .mod-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .mini-bar {
    width: 56px; height: 4px;
    background: var(--bg2);
    border-radius: 3px;
    overflow: hidden;
  }

  .mini-fill {
    height: 4px;
    border-radius: 3px;
    background: var(--green);
    transition: width 0.3s;
  }

  .chevron {
    width: 16px; height: 16px;
    color: var(--text2);
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .module-card.open .chevron { transform: rotate(180deg); }

  .topics {
    display: none;
    padding: 0 16px 14px;
    border-top: 1px solid var(--border);
  }

  .module-card.open .topics { display: block; }

  .topic-list { list-style: none; padding-top: 8px; }

  .topic-item { border-bottom: 1px solid var(--border); }
  .topic-item:last-child { border-bottom: none; }

  .topic-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
  }

  .check {
    width: 18px; height: 18px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.15s;
  }

  .check:hover { border-color: var(--green); }
  .check.done { background: var(--green); border-color: var(--green); }
  .check.done svg { display: block; }
  .check svg { display: none; width: 10px; height: 10px; }

  .topic-label { font-size: 13px; color: var(--text); flex: 1; cursor: pointer; }
  .topic-item.done .topic-label { color: var(--text2); text-decoration: line-through; }

  .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .expand-btn {
    font-size: 11px;
    color: var(--text2);
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    padding: 2px 6px;
    flex-shrink: 0;
    font-family: inherit;
    transition: all 0.15s;
  }

  .expand-btn:hover { color: var(--text); border-color: var(--border2); }

  .topic-detail {
    display: none;
    padding: 8px 0 12px 26px;
  }

  .topic-item.expanded .topic-detail { display: block; }

  .detail-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
  }

  .dtab {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .dtab:hover { color: var(--text); }
  .dtab.active { background: var(--bg2); color: var(--text); font-weight: 500; border-color: var(--border2); }

  .dtab-content { display: none; }
  .dtab-content.active { display: block; }

  .note-area {
    width: 100%;
    min-height: 70px;
    font-size: 12px;
    padding: 8px 10px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    background: var(--bg2);
    color: var(--text);
    font-family: inherit;
    resize: vertical;
    transition: border-color 0.15s;
  }

  .note-area:focus { outline: none; border-color: var(--green); }

  .resource-list { list-style: none; }
  .resource-list li { display: flex; align-items: center; gap: 6px; padding: 5px 0; font-size: 12px; color: var(--text); border-bottom: 1px solid var(--border); }
  .resource-list li:last-child { border-bottom: none; }
  .resource-list a { color: var(--info-text); text-decoration: none; font-size: 12px; }
  .resource-list a:hover { text-decoration: underline; }

  .quiz-area {
    background: var(--bg2);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .quiz-q { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 10px; line-height: 1.5; }

  .quiz-opts { display: flex; flex-direction: column; gap: 5px; }

  .quiz-opt {
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    transition: all 0.15s;
  }

  .quiz-opt:hover:not(:disabled) { background: var(--bg3); border-color: var(--border2); }
  .quiz-opt:disabled { cursor: default; }
  .quiz-opt.correct { background: #E1F5EE; color: #0F6E56; border-color: #5DCAA5; }
  .quiz-opt.wrong { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }

  .quiz-result {
    font-size: 12px;
    margin-top: 8px;
    padding: 8px 12px;
    border-radius: 6px;
    line-height: 1.5;
  }

  .quiz-result.correct { background: #E1F5EE; color: #0F6E56; }
  .quiz-result.wrong { background: #FCEBEB; color: #A32D2D; }

  .quiz-next {
    font-size: 11px;
    margin-top: 8px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: var(--bg);
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .quiz-next:hover { color: var(--text); }

  .no-quiz {
    font-size: 12px;
    color: var(--text2);
    padding: 8px 0;
  }

  /* Priority view */
  .prio-view { display: flex; flex-direction: column; gap: 8px; }

  .prio-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .prio-num {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .prio-info { flex: 1; min-width: 0; }
  .prio-info h4 { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .prio-info p { font-size: 12px; color: var(--text2); }

  .prio-right { text-align: right; flex-shrink: 0; }
  .prio-right .pct { font-size: 15px; font-weight: 600; color: var(--text); }
  .prio-right .sub { font-size: 11px; color: var(--text2); margin-bottom: 4px; }

  .hidden { display: none !important; }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .page { padding: 1.2rem 1rem 3rem; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>IT Profesyonel Eğitim Planı</h1>
    <p id="prog-text">Başlamak için konuları işaretle</p>
    <div class="progress-wrap"><div class="progress-fill" id="main-bar" style="width:0%"></div></div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="lbl">Toplam konu</div><div class="val" id="s-total">0</div></div>
    <div class="stat-card"><div class="lbl">Tamamlanan</div><div class="val" id="s-done">0</div></div>
    <div class="stat-card"><div class="lbl">Kalan</div><div class="val" id="s-left">0</div></div>
    <div class="stat-card"><div class="lbl">Quiz skoru</div><div class="val" id="s-quiz">—</div></div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('learn',this)">📚 Öğren</button>
    <button class="tab" onclick="switchTab('priority',this)">🎯 Öncelik Sırası</button>
  </div>

  <div id="tab-learn">
    <div class="cats" id="cats"></div>
    <div class="modules" id="modules"></div>
  </div>

  <div id="tab-priority" class="hidden">
    <div id="prio-list" class="prio-view"></div>
  </div>
</div>

const PRIO_REASONS = [
  'Tüm diğer konuların temeli — buradan başla',
  'Ağ temelinin üzerine inşa edilir, iş hayatında en kritik',
  'Sunucu altyapısından sonra gelen doğal adım',
  'Temel ağ bilgisi gerektiren ileri güvenlik konuları',
  'Kurumsal ortamda günlük kullanılan sistem',
  'Otomasyon ve monitoring ile verimliliği katlıyorsun',
  'Teknik altyapı bittikten sonra süreci yönet',
  'Tasarım ve ürün geliştirme süreçlerini tamamlar',
];

const PRIO_COLORS = ['#1D9E75','#378ADD','#EF9F27','#D85A30','#7F77DD','#639922','#D4537E','#888780'];
const PRIO_LIGHT = ['#E1F5EE','#E6F1FB','#FAEEDA','#FAECE7','#EEEDFE','#EAF3DE','#FBEAF0','#F1EFE8'];
const DIFF = {Kolay:'#0F6E56', Orta:'#185FA5', Zor:'#A32D2D'};
const DIFF_BG = {Kolay:'#E1F5EE', Orta:'#E6F1FB', Zor:'#FCEBEB'};

// --- State (localStorage persistence) ---
function loadState() {
  try {
    const s = localStorage.getItem('it_egitim_state');
    return s ? JSON.parse(s) : {};
  } catch(e) { return {}; }
}

function saveState() {
  try {
    localStorage.setItem('it_egitim_state', JSON.stringify({done, notes, quizStats}));
  } catch(e) {}
}

let saved = loadState();
let done = saved.done || {};
let notes = saved.notes || {};
let quizStats = saved.quizStats || {total:0, correct:0};
let quizState = {};
let activeFilter = 'all';
let openCards = {};
let expandedTopics = {};
let activeDetailTab = {};
let currentTab = 'learn';

function key(mid, i) { return mid + '__' + i; }
function totalTopics() { return DATA.reduce((a, m) => a + m.topics.length, 0); }
function doneCount() { return Object.values(done).filter(Boolean).length; }
function moduleDone(m) { return m.topics.filter((_, i) => done[key(m.id, i)]).length; }

function updateStats() {
  const t = totalTopics(), d = doneCount();
  document.getElementById('s-total').textContent = t;
  document.getElementById('s-done').textContent = d;
  document.getElementById('s-left').textContent = t - d;
  const pct = Math.round(d / t * 100);
  document.getElementById('main-bar').style.width = pct + '%';
  document.getElementById('prog-text').textContent =
    pct === 0 ? 'Başlamak için konuları işaretle' :
    pct === 100 ? 'Tebrikler! Tüm konular tamamlandı 🎉' :
    pct + '% tamamlandı — devam et!';
  if (quizStats.total > 0) {
    document.getElementById('s-quiz').textContent = Math.round(quizStats.correct / quizStats.total * 100) + '%';
  }
  saveState();
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-learn').classList.toggle('hidden', tab !== 'learn');
  document.getElementById('tab-priority').classList.toggle('hidden', tab !== 'priority');
  if (tab === 'priority') renderPriority();
}

function renderPriority() {
  const el = document.getElementById('prio-list');
  el.innerHTML = '';
  DATA.slice().sort((a, b) => a.prio - b.prio).forEach((m, i) => {
    const md = moduleDone(m), mt = m.topics.length, pct = Math.round(md / mt * 100);
    const card = document.createElement('div');
    card.className = 'prio-card';
    card.innerHTML = `
      <div class="prio-num" style="background:${PRIO_LIGHT[i]};color:${PRIO_COLORS[i]}">${i+1}</div>
      <div class="prio-info">
        <h4>${m.icon} ${m.cat}</h4>
        <p>${PRIO_REASONS[i]}</p>
      </div>
      <div class="prio-right">
        <div class="pct">${pct}%</div>
        <div class="sub">${md}/${mt} konu</div>
        <div class="mini-bar" style="width:80px">
          <div class="mini-fill" style="width:${pct}%;background:${PRIO_COLORS[i]}"></div>
        </div>
      </div>`;
    el.appendChild(card);
  });
}

function getQuiz(topicName) {
  const qs = QUIZ[topicName];
  if (!qs || !qs.length) return null;
  if (!quizState[topicName]) quizState[topicName] = {idx:0, answered:false};
  return {q: qs[quizState[topicName].idx % qs.length], st: quizState[topicName]};
}

function renderQuizInto(container, topicName) {
  const data = getQuiz(topicName);
  if (!data) {
    container.innerHTML = '<p class="no-quiz">Bu konu için henüz soru eklenmemiş.</p>';
    return;
  }
  const {q, st} = data;
  const qs = QUIZ[topicName];
  let html = `<div class="quiz-area"><div class="quiz-q">${q.q}</div><div class="quiz-opts">`;
  q.opts.forEach((o, i) => {
    let cls = '';
    if (st.answered) cls = i === q.ans ? 'correct' : (st.chosen === i ? 'wrong' : '');
    html += `<button class="quiz-opt ${cls}" onclick="answerQuiz('${topicName}',${i})" ${st.answered?'disabled':''}>${o}</button>`;
  });
  html += '</div>';
  if (st.answered) {
    const ok = st.chosen === q.ans;
    html += `<div class="quiz-result ${ok?'correct':'wrong'}">${ok?'✓ Doğru!':'✗ Yanlış.'} ${q.exp}</div>`;
    if (qs && st.idx + 1 < qs.length) {
      html += `<button class="quiz-next" onclick="nextQuiz('${topicName}')">Sonraki soru →</button>`;
    } else {
      html += `<button class="quiz-next" onclick="resetQuiz('${topicName}')">Başa dön</button>`;
    }
  }
  html += '</div>';
  container.innerHTML = html;
}

function answerQuiz(topicName, chosen) {
  const st = quizState[topicName];
  if (!st || st.answered) return;
  st.answered = true;
  st.chosen = chosen;
  quizStats.total++;
  const qs = QUIZ[topicName];
  if (qs && chosen === qs[st.idx % qs.length].ans) quizStats.correct++;
  const container = document.querySelector(`[data-quiz="${CSS.escape(topicName)}"]`);
  if (container) renderQuizInto(container, topicName);
  updateStats();
}

function nextQuiz(topicName) {
  const st = quizState[topicName];
  if (st) { st.idx++; st.answered = false; st.chosen = undefined; }
  const container = document.querySelector(`[data-quiz="${CSS.escape(topicName)}"]`);
  if (container) renderQuizInto(container, topicName);
}

function resetQuiz(topicName) {
  quizState[topicName] = {idx:0, answered:false};
  const container = document.querySelector(`[data-quiz="${CSS.escape(topicName)}"]`);
  if (container) renderQuizInto(container, topicName);
}

function toggleDone(k) {
  done[k] = !done[k];
  render();
}

function toggleExpand(k) {
  expandedTopics[k] = !expandedTopics[k];
  render();
}

function setDTab(k, tab) {
  activeDetailTab[k] = tab;
  render();
}

function saveNote(k, val) {
  notes[k] = val;
  saveState();
}

function render() {
  const catsEl = document.getElementById('cats');
  const modsEl = document.getElementById('modules');
  catsEl.innerHTML = '';
  modsEl.innerHTML = '';

  // Category filters
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn' + (activeFilter === 'all' ? ' active' : '');
  allBtn.textContent = 'Tümü';
  allBtn.onclick = () => { activeFilter = 'all'; render(); };
  catsEl.appendChild(allBtn);

  DATA.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activeFilter === m.id ? ' active' : '');
    btn.textContent = m.cat;
    btn.onclick = () => { activeFilter = m.id; render(); };
    catsEl.appendChild(btn);
  });

  const filtered = activeFilter === 'all' ? DATA : DATA.filter(m => m.id === activeFilter);

  filtered.forEach(m => {
    const md = moduleDone(m), mt = m.topics.length, pct = Math.round(md / mt * 100);
    const card = document.createElement('div');
    card.className = 'module-card' + (openCards[m.id] ? ' open' : '');

    const topicsHTML = m.topics.map((tp, i) => {
      const k = key(m.id, i);
      const isDone = done[k] || false;
      const isExp = expandedTopics[k] || false;
      const hasRes = !!RESOURCES[tp.t];
      const hasQuiz = !!(QUIZ[tp.t] && QUIZ[tp.t].length);
      const dtab = activeDetailTab[k] || 'notes';
      const noteVal = (notes[k] || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
      const res = hasRes ? RESOURCES[tp.t] : [];

      const resHTML = hasRes ? `<div class="dtab-content${dtab==='res'?' active':''}" data-dtab="${k}-res">
        <ul class="resource-list">${res.map(r=>`<li>→ <a href="${r.u}" target="_blank">${r.t}</a></li>`).join('')}</ul>
      </div>` : '';

      const quizHTML = hasQuiz ? `<div class="dtab-content${dtab==='quiz'?' active':''}" data-dtab="${k}-quiz">
        <div data-quiz="${tp.t.replace(/"/g,'&quot;')}"></div>
      </div>` : '';

      return `<li class="topic-item${isDone?' done':''}${isExp?' expanded':''}" data-key="${k}">
        <div class="topic-row">
          <div class="check${isDone?' done':''}" onclick="toggleDone('${k}')">
            <svg viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>
          </div>
          <span class="topic-label" onclick="toggleDone('${k}')">${tp.t}</span>
          <span class="badge" style="background:${DIFF_BG[tp.d]};color:${DIFF[tp.d]}">${tp.d}</span>
          <button class="expand-btn" onclick="toggleExpand('${k}')">${isExp?'▲':'▼'}</button>
        </div>
        <div class="topic-detail">
          <div class="detail-tabs">
            <button class="dtab${dtab==='notes'?' active':''}" onclick="setDTab('${k}','notes')">📝 Not</button>
            ${hasRes?`<button class="dtab${dtab==='res'?' active':''}" onclick="setDTab('${k}','res')">🔗 Kaynaklar</button>`:''}
            ${hasQuiz?`<button class="dtab${dtab==='quiz'?' active':''}" onclick="setDTab('${k}','quiz')">❓ Quiz</button>`:''}
          </div>
          <div class="dtab-content${dtab==='notes'?' active':''}" data-dtab="${k}-notes">
            <textarea class="note-area" placeholder="Bu konu hakkında notlarını buraya yaz..." onchange="saveNote('${k}',this.value)">${noteVal}</textarea>
          </div>
          ${resHTML}${quizHTML}
        </div>
      </li>`;
    }).join('');

    card.innerHTML = `
      <div class="module-header">
        <div class="mod-icon" style="background:${m.color}">${m.icon}</div>
        <div class="mod-title"><h3>${m.cat}</h3><span>${mt} konu</span></div>
        <div class="mod-meta">
          <span style="font-size:12px;color:var(--text2)">${md}/${mt}</span>
          <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
        </div>
        <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="4,6 8,10 12,6"/>
        </svg>
      </div>
      <div class="topics"><ul class="topic-list">${topicsHTML}</ul></div>`;

    card.querySelector('.module-header').addEventListener('click', () => {
      openCards[m.id] = !openCards[m.id];
      card.classList.toggle('open');
    });

    modsEl.appendChild(card);

    // Render quiz widgets
    card.querySelectorAll('[data-quiz]').forEach(el => {
      renderQuizInto(el, el.getAttribute('data-quiz'));
    });
  });

  updateStats();
}

render();
</script>
